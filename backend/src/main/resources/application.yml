spring:
  application:
    name: parking-reservation

  datasource:
    url: jdbc:mysql://localhost:3306/parking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: parking_user
    password: parking_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

app:
  jwt:
    secret: 5468696e6b696e67546f6f4d7563684d616b65734d65576f6e64657257686174536563726574436f756c644265555365644865726521
    expiration: 900000
